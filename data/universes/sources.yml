SPX:
  provider: Wikipedia
  method: html_table
  source_url: "https://en.wikipedia.org/wiki/List_of_S%26P_500_companies"
  expected_count: 500
  fallback: none
  audit_notes: "Public S&P 500 constituent table; non-official but reproducible and easy to audit."

NDX:
  provider: Nasdaq
  method: static_html_table
  source_url: "https://www.nasdaq.com/solutions/global-indexes/nasdaq-100/companies"
  expected_count: 100
  fallback: none
  audit_notes: "Official Nasdaq static Nasdaq-100 companies page; parse Symbol and Company Name table columns and record Last updated text when present."

SOX:
  provider: Nasdaq OMX
  method: export_weightings
  source_url: "https://indexes.nasdaqomx.com/Index/ExportWeightings/SOX?tradeDate={YYYY-MM-DD}T00:00:00.000&timeOfDay=SOD"
  expected_count: 30
  fallback: none
  audit_notes: "Official Nasdaq OMX SOX weighting export; try today then walk back up to 7 calendar days and record resolved URL and tradeDate."

